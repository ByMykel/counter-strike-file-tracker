name: Download CS Game Files

on:
  schedule:
    # Every 15 min, Mon-Fri, 16:00-03:00 UTC (covers both PST/PDT working hours)
    - cron: "*/15 16-23 * * 1-5"
    - cron: "*/15 0-3 * * 2-6"   # early UTC hours = still previous day in PT (Tue-Sat UTC = Mon-Fri PT evening)

    # Once an hour on weekends as a safety net
    - cron: "0 16-23 * * 0,6"
    - cron: "0 0-3 * * 0,1"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs: 
    download:
      runs-on: ubuntu-latest
      
      permissions:
        contents: write
      
      steps:
        - uses: actions/checkout@master
        - uses: actions/setup-node@v3
        - name: Download new game files
          run: npm install && node index.js '${{ secrets.USERNAME }}' '${{ secrets.PASSWORD }}'
        - name: Read manifestId.txt
          id: manifestId
          uses: juliangruber/read-file-action@v1
          with:
            path: ./static/manifestId.txt
        - name: Commit & push changes
          id: auto-commit
          uses: stefanzweifel/git-auto-commit-action@v4
          with:
            commit_message: "manifest ${{ steps.manifestId.outputs.content }}"

        - name: Trigger image-tracker update
          if: steps.auto-commit.outputs.changes_detected == 'true'
          run: |
            gh api repos/ByMykel/counter-strike-image-tracker/dispatches \
              -f event_type=game-files-updated
          env:
            GH_TOKEN: ${{ secrets.PAT_TOKEN }}
